<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>P4G Velvet Fusion Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Inter+Tight:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles/main.css">
  </head>
  <body class="intro-active">
    <section id="introScreen" class="intro-screen" aria-label="Persona 4 Golden Fusion Calculator intro">
      <div class="intro-static" aria-hidden="true"></div>
      <div class="intro-slash slash-one" aria-hidden="true"></div>
      <div class="intro-slash slash-two" aria-hidden="true"></div>
      <div class="intro-content">
        <img class="intro-logo" src="assets/p4g-logo-transparent.png" alt="Persona 4 Golden">
        <div class="intro-copy">
          <p>Velvet Room Access</p>
          <h2>Fusion Queue</h2>
          <span>Reverse recipes, Persona data, and crafting paths.</span>
        </div>
        <div class="intro-deck" aria-hidden="true">
          <span class="intro-card">I</span>
          <span class="intro-card">II</span>
          <span class="intro-card">III</span>
          <span class="intro-card chosen">IV</span>
        </div>
        <button id="introEnter" class="intro-enter" type="button">Enter Calculator</button>
      </div>
    </section>
    <div class="scene" aria-hidden="true">
      <div class="scene-grid"></div>
      <div class="scene-card card-one"></div>
      <div class="scene-card card-two"></div>
      <div class="scene-card card-three"></div>
      <div class="signal-band band-one"></div>
      <div class="signal-band band-two"></div>
    </div>
    <main class="shell">
      <section class="hero" aria-labelledby="page-title">
        <img class="brand-logo" src="assets/p4g-logo-transparent.png" alt="Persona 4 Golden">
        <div>
          <p class="kicker">Fusion Calculator</p>
          <h1 id="page-title">Velvet Fusion Queue</h1>
          <p class="lede">Search a Persona, inspect every reverse recipe, then click ingredients to build the crafting path in priority order.</p>
        </div>
      </section>

      <section class="workspace">
        <aside class="panel queue-panel" aria-label="Fusion priority queue">
          <div class="panel-title">
            <span>Priority Queue</span>
            <button id="clearQueue" class="ghost-button" type="button">Clear</button>
          </div>
          <ol id="queueList" class="queue-list"></ol>
        </aside>

        <section class="panel calculator-panel">
          <div class="search-row">
            <label class="search-box">
              <span>Persona search</span>
              <input id="personaSearch" list="personaOptions" type="search" autocomplete="off" placeholder="Try Alice, Trumpeter, Jack Frost, or Tower...">
              <datalist id="personaOptions"></datalist>
            </label>
            <button id="selectSearch" class="primary-button" type="button">Set Priority 1</button>
          </div>
          <div id="suggestions" class="suggestions" aria-live="polite"></div>
          <div id="deckStage" class="deck-stage" aria-live="polite"></div>

          <div id="activePersona" class="active-persona"></div>
          <div id="recipeSummary" class="summary-strip"></div>
          <div id="recipes" class="recipes"></div>
        </section>
      </section>
    </main>

    <script src="scripts/app.js"></script>
  </body>
</html>
